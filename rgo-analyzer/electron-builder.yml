appId: com.scheduleanalyzer.app
productName: Schedule Analyzer
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules"

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

linux:
  target:
    - target: AppImage

win:
  target:
    - target: nsis
