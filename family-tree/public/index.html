<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Tree</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-brand">
      <span class="brand-icon">🌳</span>
      <div class="brand-text">
        <h1 data-i18n="appTitle">Our Family Tree</h1>
        <p data-i18n="appSubtitle">Building our history together</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="lang-toggle" aria-label="Switch language">FR</button>
      <button id="add-member-btn" class="btn-primary" data-i18n="addMember">
        Add a Family Member
      </button>
    </div>
  </header>

  <!-- ── Tree canvas ────────────────────────────────────────────────────────── -->
  <div id="tree-area">

    <svg id="tree-svg"></svg>

    <!-- Loading state -->
    <div id="tree-loading">
      <div class="spinner"></div>
      <span data-i18n="loading">Loading…</span>
    </div>

    <!-- Empty state -->
    <div id="tree-empty">
      <div class="empty-icon">🌱</div>
      <p class="empty-text" data-i18n="emptyTree">
        The tree is empty — be the first to add a family member!
      </p>
      <button class="btn-primary" onclick="openQuestionnaire()" data-i18n="addMember">
        Add a Family Member
      </button>
    </div>

    <!-- Discrete admin link -->
    <a href="admin.html" id="admin-link" title="Admin">⚙</a>

    <!-- Zoom controls -->
    <div id="tree-controls">
      <button id="zoom-in-btn"  class="tree-ctrl-btn" title="Zoom in">+</button>
      <button id="zoom-out-btn" class="tree-ctrl-btn" title="Zoom out">−</button>
      <button id="reset-btn"    class="tree-ctrl-btn" title="Reset view">⊙</button>
    </div>

    <!-- Person detail panel -->
    <div id="detail-panel">
      <button id="detail-close" aria-label="Close">✕</button>
      <div id="detail-name"></div>
      <div id="detail-dates"></div>
      <div id="detail-notes"></div>
    </div>
  </div>

</div>

<!-- ── Questionnaire modal ─────────────────────────────────────────────────── -->
<div id="quest-modal" role="dialog" aria-modal="true" aria-labelledby="quest-modal-title">
  <div class="quest-content" id="quest-modal-title">
    <!-- Filled dynamically by app.js -->
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/tree.js"></script>
<script src="js/app.js"></script>
</body>
</html>
