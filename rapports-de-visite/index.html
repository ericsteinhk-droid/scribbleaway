<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/evoq_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00a99e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rapports" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Rapports de visite</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function showErr(text) {
          var d = document.createElement('div');
          d.style.cssText = 'position:fixed;inset:0;padding:20px;background:#fff8f8;color:#b91c1c;font:11px/1.5 monospace;overflow:auto;z-index:99999;white-space:pre-wrap;';
          d.textContent = text;
          if (document.body) { document.body.prepend(d); }
          else { window.addEventListener('DOMContentLoaded', function () { document.body.prepend(d); }); }
        }
        window.onerror = function (m, u, l, c, e) {
          showErr('JS Error:\n' + m + '\n' + (u || '') + ':' + (l || '') + (e && e.stack ? '\n' + e.stack : ''));
        };
        window.addEventListener('unhandledrejection', function (e) {
          showErr('Unhandled rejection:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
