name: meeting_minutes_app
description: Audio transcription and meeting minutes with bilingual lexicon support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Persistent storage
  sqflite: ^2.3.3
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4

  # File operations
  file_picker: ^8.1.7
  share_plus: ^10.0.0

  # Networking
  http: ^1.2.2

  # DOCX generation (ZIP/XML)
  archive: ^3.6.1

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
