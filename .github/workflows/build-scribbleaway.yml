name: Build ScribbleAway (Windows exe)

# Builds the single-file Windows .exe on a Windows runner.
#   * every build uploads the exe as a downloadable workflow artifact
#   * pushing a tag like v1.0.0 also attaches the exe to a GitHub Release
# No secrets or API keys are used or bundled — the user supplies their Gemini
# key at runtime through the app's Settings screen.

on:
  push:
    branches:
      - main
      - master
      - claude/windows-clutter-removal-gemini-527nty
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to attach assets to a Release on tagged builds

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: scribbleaway

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe with PyInstaller
        run: pyinstaller --clean --noconfirm scribbleaway.spec

      - name: Upload exe as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: photoclean-windows
          path: scribbleaway/dist/photoclean.exe
          if-no-files-found: error

      - name: Attach exe to GitHub Release (tagged builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: scribbleaway/dist/photoclean.exe
