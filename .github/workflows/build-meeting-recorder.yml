name: Build Android APK — Transcripteur de Réunion

on:
  workflow_dispatch:
  push:
    branches:
      - claude/audio-recorder-transcription-8t4bz3
      - main
    paths:
      - 'meeting-recorder/**'
      - '.github/workflows/build-meeting-recorder.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/audio-recorder-transcription-8t4bz3

      # ── Java 21 ─────────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Install Gradle 8.7 directly (avoids needing gradle-wrapper.jar) ─────
      # gradle/actions/setup-gradle downloads and installs the exact Gradle
      # version; we then call `gradle` directly instead of ./gradlew.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-read-only: false

      # ── Build debug APK ─────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: meeting-recorder
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: gradle assembleDebug --no-daemon --stacktrace

      # ── Rename APK ──────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv meeting-recorder/app/build/outputs/apk/debug/app-debug.apk \
             meeting-recorder/app/build/outputs/apk/debug/TranscripteurReunion-${{ github.run_number }}.apk

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranscripteurReunion-debug-${{ github.run_number }}
          path: meeting-recorder/app/build/outputs/apk/debug/TranscripteurReunion-${{ github.run_number }}.apk
          retention-days: 14

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "transcripteur-build-${{ github.run_number }}" \
            "meeting-recorder/app/build/outputs/apk/debug/TranscripteurReunion-${{ github.run_number }}.apk#TranscripteurReunion.apk" \
            --title "Transcripteur de Réunion — Build ${{ github.run_number }}" \
            --notes "## Transcripteur de Réunion — APK debug

          **Branche :** \`${{ github.ref_name }}\`
          **Commit :** \`${{ github.sha }}\`

          ---

          ### Installer sur Android

          1. Téléchargez **TranscripteurReunion.apk** ci-dessous
          2. Sur votre téléphone : **Paramètres → Applications → Installer des applications inconnues** → autorisez votre navigateur
          3. Ouvrez le fichier téléchargé et appuyez sur **Installer**

          ### Première ouverture
          Allez dans l'onglet **Paramètres ⚙️** pour saisir votre clé API Claude.
          L'enregistrement et la transcription fonctionnent même sans clé.

          ---
          > Build debug non signé — usage personnel uniquement."
