name: Build Android APK — Transcripteur de Réunion

on:
  workflow_dispatch:
  push:
    branches:
      - claude/audio-recorder-transcription-8t4bz3
      - main
    paths:
      - 'meeting-recorder/**'
      - '.github/workflows/build-meeting-recorder.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/audio-recorder-transcription-8t4bz3

      # ── Java 21 ─────────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('meeting-recorder/**/*.gradle.kts', 'meeting-recorder/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Bootstrap gradle-wrapper.jar ─────────────────────────────────────────
      # The JAR is a binary that can't be stored as text in the repo.
      # We download the matching Gradle distribution and extract just the jar.
      - name: Bootstrap gradle-wrapper.jar
        working-directory: meeting-recorder
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          echo "Bootstrapping gradle-wrapper.jar for Gradle $GRADLE_VERSION"
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -o /tmp/gradle.zip
          unzip -p /tmp/gradle.zip \
            "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-main-${GRADLE_VERSION}.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null \
          || unzip -j /tmp/gradle.zip \
            "gradle-${GRADLE_VERSION}/lib/gradle-wrapper*.jar" \
            -d /tmp/gradle-libs/ \
          && cp /tmp/gradle-libs/gradle-wrapper*.jar gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        working-directory: meeting-recorder
        run: chmod +x gradlew

      # ── Build debug APK ─────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: meeting-recorder
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Rename APK ──────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv meeting-recorder/app/build/outputs/apk/debug/app-debug.apk \
             meeting-recorder/app/build/outputs/apk/debug/TranscripteurReunion-${{ github.run_number }}.apk

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranscripteurReunion-debug-${{ github.run_number }}
          path: meeting-recorder/app/build/outputs/apk/debug/TranscripteurReunion-${{ github.run_number }}.apk
          retention-days: 14

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "transcripteur-build-${{ github.run_number }}" \
            "meeting-recorder/app/build/outputs/apk/debug/TranscripteurReunion-${{ github.run_number }}.apk#TranscripteurReunion.apk" \
            --title "Transcripteur de Réunion — Build ${{ github.run_number }}" \
            --notes "## Transcripteur de Réunion — APK debug

          **Branche :** \`${{ github.ref_name }}\`
          **Commit :** \`${{ github.sha }}\`

          ---

          ### Installer sur Android

          1. Téléchargez **TranscripteurReunion.apk** ci-dessous
          2. Sur votre téléphone : **Paramètres → Applications → Installer des applications inconnues** → autorisez votre navigateur
          3. Ouvrez le fichier téléchargé et appuyez sur **Installer**

          ### Première ouverture
          Allez dans l'onglet **Paramètres ⚙️** pour saisir votre clé API Claude.
          L'enregistrement et la transcription fonctionnent même sans clé.

          ---
          > Build debug non signé — usage personnel uniquement."
