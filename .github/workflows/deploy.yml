name: Déployer sur Firebase Hosting

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire l'application
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.APIKEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.AUTHDOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.PROJECTID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.STORAGEBUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.MESSAGINGSENDERID }}
          VITE_FIREBASE_APP_ID: ${{ vars.APPID }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: npm run build

      - name: Déployer — production (main)
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ vars.PROJECTID }}

      - name: Déployer — preview (branche / PR)
        if: github.ref != 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: preview-${{ github.event.number || github.ref_name }}
          expires: 7d
          projectId: ${{ vars.PROJECTID }}
