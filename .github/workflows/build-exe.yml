name: Build EVOQ Search Tools

on:
  workflow_dispatch:   # manual trigger from the GitHub UI / mobile app

permissions:
  contents: write      # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build WordSearch.exe
        run: pyinstaller word_search.spec

      - name: Build FileSearch.exe
        run: pyinstaller file_search.spec

      - name: Publish both executables as GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v5.1-build.${{ github.run_number }}" `
            dist\WordSearch.exe `
            dist\FileSearch.exe `
            --title "EVOQ Search Tools v5.1 (build ${{ github.run_number }})" `
            --notes "## EVOQ Search Tools v5.1`n`n**WordSearch.exe** — Search keyword across Word (.docx) files only.`n`n**FileSearch.exe** — Search across Word (.docx) OR Excel (.xlsx / .xls) files. Choose file type at startup."
