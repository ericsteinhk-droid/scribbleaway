name: Build WordSearch.exe

on:
  workflow_dispatch:   # manual trigger from the GitHub UI / mobile app

permissions:
  contents: write      # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller word_search.spec

      - name: Publish as GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v5.1-build.${{ github.run_number }}" dist\WordSearch.exe `
            --title "WordSearch v5.1 (build ${{ github.run_number }})" `
            --notes "Automated build from workflow run #${{ github.run_number }}. Download WordSearch.exe below."
