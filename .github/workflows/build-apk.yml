name: Build ScribbleAway APK

on:
  push:
    branches:
      - claude/android-meeting-recorder-app-3S7fw
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version tag (e.g. scribbleaway-v1.0.0). Leave blank to use default.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK platform 34
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > MeetingRecorder/local.properties

      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: MeetingRecorder

      - name: Determine version tag
        id: version
        run: |
          if [[ -n "${{ inputs.release_version }}" ]]; then
            echo "tag=${{ inputs.release_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=scribbleaway-v1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          mkdir -p dist
          cp MeetingRecorder/app/build/outputs/apk/debug/app-debug.apk \
             dist/ScribbleAway-${{ steps.version.outputs.tag }}.apk

      - name: Move tag to current commit
        run: |
          git tag -f ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }} --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ScribbleAway ${{ steps.version.outputs.tag }}
          make_latest: true
          files: dist/ScribbleAway-${{ steps.version.outputs.tag }}.apk
          body: |
            ## ScribbleAway ${{ steps.version.outputs.tag }}

            Application Android pour l'enregistrement de réunions de chantier en français canadien.

            ### Pipeline
            - **Enregistrement** : segments M4A (≤15 min), bip sonore discret
            - **Transcription** : OpenAI Whisper (`whisper-1`, fr, verbose_json)
            - **Diarisation** : GPT-4o — attribution des locuteurs par analyse du contenu
            - **Résumé structuré** : Anthropic Claude — résumé exécutif, points discutés, décisions, actions, points en suspens
            - **Export** : DOCX complet (résumé + transcription diarisée), aperçu avant export
            - **Partage audio** : partage des fichiers M4A directement depuis l'écran d'aperçu

            ### Clés API requises
            - **OpenAI** (platform.openai.com) — transcription Whisper + diarisation GPT-4o
            - **Anthropic** (console.anthropic.com) — résumé intelligent (optionnel)

            ### Installation
            1. Télécharger `ScribbleAway-${{ steps.version.outputs.tag }}.apk`
            2. Transférer sur l'appareil Android (API 26 / Android 8.0+)
            3. Activer **Installer depuis des sources inconnues** si requis
            4. Ouvrir le fichier APK pour installer
            5. Aller dans **Paramètres** et entrer les clés API
