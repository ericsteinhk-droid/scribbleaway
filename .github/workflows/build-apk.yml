name: Build Meeting Recorder APK

on:
  workflow_dispatch:   # manual trigger from the GitHub UI / mobile app

permissions:
  contents: write      # needed to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('MeetingRecorder/gradle/wrapper/gradle-wrapper.properties', 'MeetingRecorder/app/build.gradle.kts') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x MeetingRecorder/gradlew

      - name: Build debug APK
        working-directory: MeetingRecorder
        run: ./gradlew assembleDebug --no-daemon

      - name: Publish APK as GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "meeting-recorder-v1.0-run${{ github.run_number }}-attempt${{ github.run_attempt }}" \
            MeetingRecorder/app/build/outputs/apk/debug/app-debug.apk \
            --title "Meeting Recorder v1.0 (build ${{ github.run_number }})" \
            --notes "## Enregistreur de réunion v1.0

          Android app for recording construction site meetings in Canadian French.

          **Requirements:** Android 8.0+ (API 26)

          **Setup:** On first launch, tap ⚙ Paramètres and enter your OpenAI API key.

          ### Features
          - Chunked recording (auto-splits every 15 min for Whisper API)
          - Faint beep at start, pause, and stop
          - Whisper transcription in Canadian French with construction lexicon
          - GPT-4o speaker diarization (Gérant de projet, Architecte, Surintendant, etc.)
          - Structured summary: résumé exécutif, points discutés, décisions, actions
          - Preview before export
          - Single DOCX export with full summary + diarized transcript"
