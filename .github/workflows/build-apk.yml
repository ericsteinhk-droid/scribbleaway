name: Build Android APK — Rapports de visite

on:
  workflow_dispatch:   # manual trigger from GitHub UI / mobile app
  push:
    branches:
      - claude/web-app-features-KU9ZJ
      - main
    paths:
      - 'rapports-de-visite/**'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: claude/web-app-features-KU9ZJ

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Web build ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: rapports-de-visite
        run: npm install

      - name: Build web assets (Vite)
        working-directory: rapports-de-visite
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: npm run build

      # ── Capacitor / Android project ───────────────────────────────────────
      - name: Add Capacitor Android platform
        working-directory: rapports-de-visite
        run: npx cap add android

      - name: Sync web assets into Android project
        working-directory: rapports-de-visite
        run: npx cap sync android

      # ── Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Java 21 — must come AFTER setup-android to win the JAVA_HOME race ─
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── Android patches (permissions + WebView microphone) ───────────────
      - name: Patch AndroidManifest — add audio & camera permissions
        working-directory: rapports-de-visite/android
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />|' \
            app/src/main/AndroidManifest.xml

      - name: Patch MainActivity — grant WebView microphone permission
        working-directory: rapports-de-visite/android
        run: |
          cat > app/src/main/java/com/evoq/rapportsdevisite/MainActivity.java << 'JAVA'
          package com.evoq.rapportsdevisite;

          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebChromeClient;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  bridge.getWebView().setWebChromeClient(new BridgeWebChromeClient(bridge) {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          runOnUiThread(() -> request.grant(request.getResources()));
                      }
                  });
              }
          }
          JAVA

      # ── Gradle build ─────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: rapports-de-visite/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: rapports-de-visite/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Publish ──────────────────────────────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapports-de-visite-debug-${{ github.run_number }}
          path: rapports-de-visite/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "rdv-build-${{ github.run_number }}-${{ github.run_attempt }}" \
            "rapports-de-visite/android/app/build/outputs/apk/debug/app-debug.apk#Rapports-de-visite-debug.apk" \
            --title "Rapports de visite — Build ${{ github.run_number }}" \
            --notes "## Rapports de visite — Debug APK

          **Built from:** \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`

          ### Install on Android
          1. Download \`Rapports-de-visite-debug.apk\`
          2. On your Android device: Settings → Apps → Install unknown apps → allow your browser
          3. Open the downloaded file to install

          > Note: This is a debug build. For a production release, add a signing keystore to GitHub Secrets and switch to \`assembleRelease\`."
