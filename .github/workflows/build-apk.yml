name: Build Android APK — Rapports de visite

on:
  workflow_dispatch:   # manual trigger from GitHub UI / mobile app
  push:
    branches:
      - claude/web-app-features-KU9ZJ
      - main
    paths:
      - 'rapports-de-visite/**'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout app branch
        uses: actions/checkout@v4
        with:
          ref: claude/web-app-features-KU9ZJ

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Web build ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: rapports-de-visite
        run: npm install

      # @capacitor/camera's CameraUtils.java uses getExternalFilesDir() for the
      # camera temp file. On devices where external storage is unavailable it
      # returns null, causing File.createTempFile to throw "Unable to create
      # photo on disk". Patch it to fall back to getCacheDir().
      - name: Patch @capacitor/camera — cache dir fallback for temp file
        working-directory: rapports-de-visite
        run: |
          python3 << 'PYEOF'
          f = 'node_modules/@capacitor/camera/android/src/main/java/com/capacitorjs/plugins/camera/CameraUtils.java'
          src = open(f).read()
          old = 'File storageDir = activity.getExternalFilesDir(Environment.DIRECTORY_PICTURES);'
          new = old + '\n        if (storageDir == null) { storageDir = activity.getCacheDir(); }'
          patched = src.replace(old, new)
          open(f, 'w').write(patched)
          print('Patched' if patched != src else 'Already patched or pattern not found')
          PYEOF

      # On Android 10+, FLAG_GRANT_READ_URI_PERMISSION on the share intent alone does NOT
      # propagate through createChooser() to the app the user picks (e.g. Gmail).
      # The fix is to also set ClipData on the intent with the same URI(s), which lets
      # Android grant read permission to any app selected from the chooser.
      # We patch SharePlugin.java here because @capacitor/share v8 does not do this.
      - name: Patch @capacitor/share — add ClipData for email attachment support
        working-directory: rapports-de-visite
        run: |
          python3 << 'PYEOF'
          import re, sys
          f = 'node_modules/@capacitor/share/android/src/main/java/com/capacitorjs/plugins/share/SharePlugin.java'
          try:
              src = open(f).read()
          except FileNotFoundError:
              print('SharePlugin.java not found — skipping patch')
              sys.exit(0)

          # Print a diagnostic excerpt so future debugging is easier
          idx = src.find('FLAG_GRANT_READ_URI_PERMISSION')
          if idx >= 0:
              print('=== SharePlugin.java context ===')
              print(src[max(0, idx-400):idx+300])
              print('================================')
          else:
              print('FLAG_GRANT_READ_URI_PERMISSION not found — printing first 1500 chars:')
              print(src[:1500])

          if 'ClipData' in src:
              print('ClipData already present — skipping patch')
              sys.exit(0)

          # Ensure ClipData is imported
          if 'import android.content.ClipData' not in src:
              src = src.replace(
                  'import android.content.Intent;',
                  'import android.content.ClipData;\nimport android.content.Intent;',
                  1)

          # After the FLAG_GRANT_READ_URI_PERMISSION line, inject ClipData setup.
          # The local variable holding the list of URIs may be named 'uris', 'fileUris',
          # or similar — we try the two most common names.
          clip_snippet = (
              '\n        // Propagate URI read permission through ACTION_CHOOSER on Android 10+\n'
              '        if (!{VAR}.isEmpty()) {\n'
              '            android.content.ClipData cd = android.content.ClipData.newRawUri("", {VAR}.get(0));\n'
              '            for (int _i = 1; _i < {VAR}.size(); _i++) cd.addItem(new android.content.ClipData.Item({VAR}.get(_i)));\n'
              '            intent.setClipData(cd);\n'
              '        }'
          )
          target = 'intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);'
          patched = False
          for var in ('uris', 'fileUris', 'shareUris', 'intentUris'):
              if var in src and target in src:
                  src = src.replace(target, target + clip_snippet.replace('{VAR}', var), 1)
                  patched = True
                  print(f'Applied ClipData patch using variable name: {var}')
                  break
          if not patched:
              print('WARNING: Could not apply ClipData patch — no matching variable name found')

          open(f, 'w').write(src)
          PYEOF

      - name: Build web assets (Vite)
        working-directory: rapports-de-visite
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: npm run build

      # ── Capacitor / Android project ───────────────────────────────────────
      - name: Add Capacitor Android platform
        working-directory: rapports-de-visite
        run: npx cap add android

      - name: Sync web assets into Android project
        working-directory: rapports-de-visite
        run: npx cap sync android

      # @capacitor/camera registers a FileProvider that needs file_paths.xml.
      # cap sync sometimes doesn't copy the plugin's XML resource to the app
      # module — creating it explicitly prevents the ContentProvider init crash.
      - name: Create FileProvider file_paths.xml for camera plugin
        working-directory: rapports-de-visite/android
        run: |
          mkdir -p app/src/main/res/xml
          cat > app/src/main/res/xml/file_paths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external" path="." />
              <external-files-path name="external_files" path="." />
              <cache-path name="cache" path="." />
              <external-cache-path name="external_cache" path="." />
              <files-path name="files" path="." />
          </paths>
          XML

      # ── Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Java 21 — must come AFTER setup-android to win the JAVA_HOME race ─
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── Android patches (permissions + FileProvider for camera) ────────────
      - name: Patch AndroidManifest — permissions + FileProvider
        working-directory: rapports-de-visite/android
        run: |
          # Add missing runtime permissions
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />|' \
            app/src/main/AndroidManifest.xml
          # @capacitor/camera plugin manifest omits FileProvider; add it so
          # CameraUtils.createImageFileUri() can share the temp file with the camera app.
          sed -i 's|</application>|    <provider\n            android:name="androidx.core.content.FileProvider"\n            android:authorities="${applicationId}.fileprovider"\n            android:exported="false"\n            android:grantUriPermissions="true">\n            <meta-data\n                android:name="android.support.FILE_PROVIDER_PATHS"\n                android:resource="@xml/file_paths" />\n        </provider>\n    </application>|' \
            app/src/main/AndroidManifest.xml


      # ── Gradle build ─────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: rapports-de-visite/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: rapports-de-visite/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Publish ──────────────────────────────────────────────────────────
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapports-de-visite-debug-${{ github.run_number }}
          path: rapports-de-visite/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "rdv-build-${{ github.run_number }}-${{ github.run_attempt }}" \
            "rapports-de-visite/android/app/build/outputs/apk/debug/app-debug.apk#Rapports-de-visite-debug.apk" \
            --title "Rapports de visite — Build ${{ github.run_number }}" \
            --notes "## Rapports de visite — Debug APK

          **Built from:** \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`

          ### Install on Android
          1. Download \`Rapports-de-visite-debug.apk\`
          2. On your Android device: Settings → Apps → Install unknown apps → allow your browser
          3. Open the downloaded file to install

          > Note: This is a debug build. For a production release, add a signing keystore to GitHub Secrets and switch to \`assembleRelease\`."
