name: Build Windows Executables

on:
  push:
    branches:
      - claude/build-windows-exe-l82WU
    paths:
      - 'src/**'
      - '*.spec'
      - 'requirements.txt'
      - '.github/workflows/build-windows-exe.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl matplotlib pyinstaller

      - name: Build AnalyseurHeures.exe
        run: pyinstaller analyseur_heures1.spec --distpath dist --workpath build_tmp/heures --clean

      - name: Build AnalyseurPhases.exe
        run: pyinstaller analyseur_phases.spec --distpath dist --workpath build_tmp/phases --clean

      - name: List built files
        run: dir dist

      - name: Upload AnalyseurHeures.exe
        uses: actions/upload-artifact@v4
        with:
          name: AnalyseurHeures
          path: dist/AnalyseurHeures.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload AnalyseurPhases.exe
        uses: actions/upload-artifact@v4
        with:
          name: AnalyseurPhases
          path: dist/AnalyseurPhases.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload both executables as combined archive
        uses: actions/upload-artifact@v4
        with:
          name: EVOQ-Analyseurs-Windows
          path: |
            dist/AnalyseurHeures.exe
            dist/AnalyseurPhases.exe
          if-no-files-found: error
          retention-days: 30
