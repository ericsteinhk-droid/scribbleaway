name: Build Meeting Minutes APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/audio-transcription-minutes-app-vgeqe6
    paths:
      - 'meeting_minutes_app/**'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/audio-transcription-minutes-app-vgeqe6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: meeting_minutes_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: meeting_minutes_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scribbleaway-meeting-minutes-debug-${{ github.run_number }}
          path: meeting_minutes_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "meeting-minutes-build-${{ github.run_number }}" \
            "meeting_minutes_app/build/app/outputs/flutter-apk/app-debug.apk#ScribbleAway-MeetingMinutes-debug.apk" \
            --title "ScribbleAway Meeting Minutes — Build ${{ github.run_number }}" \
            --notes "## ScribbleAway Meeting Minutes — Debug APK

          **Built from:** \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`

          ### Install on Android
          1. Download \`ScribbleAway-MeetingMinutes-debug.apk\`
          2. On your Android device: Settings → Apps → Install unknown apps → allow your browser or Files app
          3. Open the downloaded APK file to install

          ### First-time setup
          Open the app → tap the gear icon → enter your:
          - **OpenAI API key** (for Whisper audio transcription)
          - **Anthropic API key** (for Claude meeting minutes generation)

          > Debug build signed with the Android debug key. Not for Play Store distribution." \
            --repo ericsteinhk-droid/scribbleaway
