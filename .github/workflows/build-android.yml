name: Build EVOQ Field Recorder APK

on:
  push:
    branches:
      - claude/android-audio-recorder-app-WJH19
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to publish as a GitHub Release (e.g. v1.0.0). Leave blank to build only.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK platform 34
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > evoq-recorder/local.properties

      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: evoq-recorder

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.release_version }}" ]]; then
            echo "tag=${{ inputs.release_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=evoq-recorder-v1.0.0" >> $GITHUB_OUTPUT
          fi
          echo "publish=true" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p dist
          cp evoq-recorder/app/build/outputs/apk/debug/app-debug.apk \
             dist/EVOQ_AssistantChantier-${{ steps.version.outputs.tag }}.apk

      - name: Move tag to current commit
        if: steps.version.outputs.publish == 'true'
        run: |
          git tag -f ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }} --force

      - name: Create GitHub Release
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EVOQ Assistant Chantier ${{ steps.version.outputs.tag }}
          make_latest: true
          files: dist/EVOQ_AssistantChantier-${{ steps.version.outputs.tag }}.apk
          body: |
            ## EVOQ Assistant Chantier ${{ steps.version.outputs.tag }}

            Application de rapport de chantier pour EVOQ Architecture.

            ### Fonctionnalités
            - Transcription vocale en direct (français et anglais)
            - Lexique technique intégré : matériaux, activités, intervenants, acronymes
            - Rapport de chantier structuré via Claude (clé API Anthropic requise)
            - Codes de localisation lettre+chiffre (ex : V3, S4) auto-développés
            - Tri des observations par étage ou par zone
            - Export et partage en DOCX

            ### Prérequis
            - Clé API Claude (console.anthropic.com)

            ### Installation
            1. Télécharger `EVOQ_AssistantChantier-${{ steps.version.outputs.tag }}.apk`
            2. Transférer sur l'appareil Android (API 26 / Android 8.0+)
            3. Activer **Installer depuis des sources inconnues** si requis
            4. Ouvrir le fichier APK pour installer
            5. Aller dans **Paramètres** et entrer la clé API Claude
