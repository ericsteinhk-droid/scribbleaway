name: Build EVOQ Field Recorder APK

on:
  push:
    branches:
      - claude/android-audio-recorder-app-WJH19
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Write local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > evoq-recorder/local.properties

      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: evoq-recorder

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EVOQ-FieldRecorder
          path: evoq-recorder/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
