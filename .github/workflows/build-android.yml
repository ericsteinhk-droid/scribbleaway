name: Build EVOQ Field Recorder APK

on:
  push:
    branches:
      - claude/android-audio-recorder-app-WJH19
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to publish as a GitHub Release (e.g. v1.0.0). Leave blank to build only.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK platform 34
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > evoq-recorder/local.properties

      - name: Build debug APK
        run: gradle assembleDebug
        working-directory: evoq-recorder

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.release_version }}" ]]; then
            echo "tag=${{ inputs.release_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v1.0.0" >> $GITHUB_OUTPUT
          fi
          echo "publish=true" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p dist
          cp evoq-recorder/app/build/outputs/apk/debug/app-debug.apk \
             dist/EVOQ-FieldRecorder-${{ steps.version.outputs.tag }}.apk

      - name: Move tag to current commit
        if: steps.version.outputs.publish == 'true'
        run: |
          git tag -f ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }} --force

      - name: Create GitHub Release
        if: steps.version.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: EVOQ Field Recorder ${{ steps.version.outputs.tag }}
          make_latest: true
          files: dist/EVOQ-FieldRecorder-${{ steps.version.outputs.tag }}.apk
          body: |
            ## EVOQ Field Recorder ${{ steps.version.outputs.tag }}

            Android field recording and report generation app for EVOQ Architecture.

            ### Features
            - Live voice transcription in English and French
            - High-accuracy transcription via OpenAI Whisper (optional — configure key in Settings)
            - AI-powered structured field report via Claude (Anthropic API key required)
            - Location codes: letter+number (e.g. V3, S4) auto-expanded to wing + floor
            - Sort observations by floor or zone
            - Export and share as DOCX

            ### Installation
            1. Download `EVOQ-FieldRecorder-${{ steps.version.outputs.tag }}.apk`
            2. Transfer to your Android device (API 26 / Android 8.0+)
            3. Enable **Install from unknown sources** if prompted
            4. Open the APK to install
            5. Go to **Settings** and enter your Claude API key (and optionally your OpenAI key for Whisper)
